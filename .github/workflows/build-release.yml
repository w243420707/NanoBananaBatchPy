name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-python.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller --onefile --name NanoBananaBatch --add-data "public;public" --icon favicon.ico nano_banana_batch.py
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NanoBananaBatch.exe
        generate_release_notes: true
        draft: false
        prerelease: false